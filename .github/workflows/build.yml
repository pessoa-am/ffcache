name: Build Distribution

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        cfg:
        - { os: ubuntu-18.04, cxx: g++-10, python: 3.9 }
        - { os: ubuntu-18.04, cxx: g++-8, python: 3.9 }
        - { os: ubuntu-18.04, cxx: g++-10, python: 3.6 }
        - { os: ubuntu-18.04, cxx: g++-8, python: 3.6 }
        - { os: ubuntu-18.04, cxx: clang++-9, python: 3.9 }

    runs-on: ${{ matrix.cfg.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.cfg.python }}
    - name: Install build dependencies
      run: python -m pip install --upgrade pip setuptools wheel cython
    - name: Build and install
      run: python -m pip install -e .
    - name: Test import
      run: python -c 'import ffcache; print(ffcache.__version__ if hasattr(ffcache, "__version__") else "OK")'
    - name: Build distribution
      run: python -m pip install build && python -m build
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ffcache-${{ matrix.cfg.os }}-py${{ matrix.cfg.python }}
        path: dist/
