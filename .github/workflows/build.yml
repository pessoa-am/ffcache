name: Build Distribution

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    runs-on: self-hosted
    steps:
    - name: Setup pyenv
      run: |
        export PATH="$HOME/.pyenv/bin:$HOME/.pyenv/shims:$PATH"
        echo "$HOME/.pyenv/bin:$HOME/.pyenv/shims" >> $GITHUB_PATH
    - uses: actions/checkout@v4
    - name: Set local Python version
      run: |
        export PATH="$HOME/.pyenv/bin:$HOME/.pyenv/shims:$PATH"
        pyenv local ${{ matrix.python-version }}
    - name: Install build dependencies
      run: python -m pip install --upgrade pip setuptools wheel cython
    - name: Build and install
      run: python -m pip install -e .
    - name: Test import
      run: python -c 'import ffcache; print(ffcache.__version__ if hasattr(ffcache, "__version__") else "OK")'
    - name: Build distribution
      run: python -m pip install build && python -m build
    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.python-version }}-ubuntu-latest
        path: dist/*.whl
    - name: Upload sdist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist-sdist
        path: dist/*.tar.gz
        if-no-files-found: warn
        overwrite: true

  publish-to-pypi:
    name: >-
      Publish ffcache to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ffcache
    permissions:
      id-token: write
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        path: dist/
    - name: Publish ffcache to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
