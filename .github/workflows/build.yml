name: Build Distribution

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    runs-on: self-hosted
    steps:
    - name: Install pyenv
      run: |
        git clone https://github.com/pyenv/pyenv.git $HOME/.pyenv
        export PATH="$HOME/.pyenv/bin:$HOME/.pyenv/shims:$PATH"
        echo "$HOME/.pyenv/bin:$HOME/.pyenv/shims" >> $GITHUB_PATH
    - name: Install Python ${{ matrix.python-version }}
      run: |
        export PATH="$HOME/.pyenv/bin:$HOME/.pyenv/shims:$PATH"
        pyenv install ${{ matrix.python-version }} || true
    - uses: actions/checkout@v4
    - name: Set local Python version
      run: |
        export PATH="$HOME/.pyenv/bin:$HOME/.pyenv/shims:$PATH"
        pyenv local ${{ matrix.python-version }}
    - name: Install build dependencies
      run: python -m pip install --upgrade pip setuptools wheel cython
    - name: Build and install
      run: python -m pip install -e .
    - name: Test import
      run: python -c 'import ffcache; print(ffcache.__version__ if hasattr(ffcache, "__version__") else "OK")'
    - name: Build distribution
      run: python -m pip install build && python -m build
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ffcache-py${{ matrix.python-version }}
        path: dist/
